services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rce
      POSTGRES_PASSWORD: rce
      POSTGRES_DB: rce
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rce"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: ["ollama:/root/.ollama"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      RCE_DATABASE_URL: postgresql+psycopg2://rce:rce@postgres:5432/rce
      RCE_CHROMA_PATH: /data/chroma
      RCE_OLLAMA_URL: http://ollama:11434
      RCE_JWT_SECRET: dev-secret-change-me
      RCE_EMBED_MODEL: nomic-embed-text
      RCE_GEN_MODEL: llama3
    ports: ["8000:8000"]
    volumes: ["chroma:/data/chroma"]

volumes:
  pgdata:
  ollama:
  chroma:
